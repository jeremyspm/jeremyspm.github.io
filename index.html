<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0e1420"/>
<!-- shared by link, not meant for search engines — remove this line if you ever want indexing -->
<meta name="robots" content="noindex"/>
<title>BN Hub — study tools & apps</title>
<style>
:root{
  --bg:#0e1420; --bg2:#141c2b; --card:#182133; --card2:#1e2941;
  --line:#27324a; --line2:#33405c;
  --tx:#e8eef7; --tx2:#9fb0c8; --tx3:#6d7f9c;
  --acc:#4f9dff; --acc2:#2f6fd0;
  --good:#39d98a; --hard:#ffce54;
  --shadow:0 10px 40px rgba(0,0,0,.45);
  --r:16px; --maxw:900px;
}
html[data-theme="light"]{
  --bg:#eef2f8; --bg2:#e3e9f3; --card:#ffffff; --card2:#f4f7fc;
  --line:#dbe3ef; --line2:#c7d3e6;
  --tx:#16202f; --tx2:#4a5a72; --tx3:#7d8ca5;
  --acc:#1f6fe0; --acc2:#1657b8;
  --good:#128a55; --hard:#a9791a;
  --shadow:0 8px 30px rgba(30,50,90,.14);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{background:linear-gradient(180deg,var(--bg),var(--bg2)) fixed;color:var(--tx);
  font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.wrap{max-width:var(--maxw);margin:0 auto;padding:26px 18px 80px}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none}
header{display:flex;align-items:flex-start;gap:12px;margin-bottom:6px}
h1{font-size:26px;margin:0;letter-spacing:-.4px}
.sub{color:var(--tx2);font-size:14px;margin:4px 0 0}
.iconbtn{width:38px;height:38px;border-radius:10px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--tx2);margin-left:auto;transition:.15s;flex:0 0 auto}
.iconbtn:hover{border-color:var(--line2);color:var(--tx)}
.search{margin:20px 0 6px}
.search input{width:100%;background:var(--card);border:1.5px solid var(--line2);border-radius:12px;padding:12px 16px;color:var(--tx);font:inherit;outline:none;transition:.15s}
.search input:focus{border-color:var(--acc)}
h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx3);margin:26px 0 12px;display:flex;align-items:center;gap:8px}
h2.sec::after{content:"";flex:1;height:1px;background:var(--line)}
h3.subsec{font-size:13px;font-weight:700;color:var(--tx2);margin:16px 0 9px 4px;padding-left:11px;border-left:2px solid var(--line2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:11px}
.grid+h3.subsec{margin-top:20px}
.tile{display:flex;flex-direction:column;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;text-decoration:none;color:inherit;transition:.16s;position:relative;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.tile:hover{transform:translateY(-2px);border-color:var(--acc);box-shadow:var(--shadow)}
.tile .top{display:flex;align-items:center;gap:10px}
.tile[data-b] .top{padding-right:46px}   /* keep the title clear of the corner badge, esp. when it wraps on narrow screens */
.tile .ic{font-size:24px;line-height:1}
.tile .nm{font-weight:800;font-size:15px;letter-spacing:-.2px;line-height:1.25}
.tile .ds{font-size:12.5px;color:var(--tx2);line-height:1.45}
.tile .tiledate{align-self:flex-end;font-size:10.5px;color:var(--tx3);font-variant-numeric:tabular-nums;margin-top:2px}
.tile .badge{position:absolute;top:12px;right:12px;font-size:9.5px;font-weight:800;letter-spacing:.7px;padding:3px 7px;border-radius:6px;text-transform:uppercase}
.badge.beta{background:rgba(255,206,84,.14);color:var(--hard);border:1px solid rgba(255,206,84,.35)}
.badge.new{background:rgba(57,217,138,.13);color:var(--good);border:1px solid rgba(57,217,138,.35)}
.empty{color:var(--tx3);text-align:center;padding:50px 10px;font-size:14px}
.soon{color:var(--tx3);font-size:12.5px;padding:11px 15px;border:1px dashed var(--line2);border-radius:12px}
.soon-sub{padding:9px 13px;font-size:12px}
.foot{margin-top:44px;text-align:center;font-size:12px;color:var(--tx3);line-height:1.7}
.foot a{color:var(--tx3)}
/* ⚡ Study engine button */
.sbGo{width:100%;display:none;align-items:center;gap:12px;text-align:left;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border-radius:14px;padding:13px 16px;min-height:62px;margin:16px 0 0;box-shadow:0 6px 22px rgba(79,157,255,.32);transition:.15s}
.sbGo.on{display:flex}
.sbGo:hover{transform:translateY(-1px)}
.sbGo .zap{font-size:24px;flex:0 0 auto}
.sbGo .txt{flex:1;min-width:0}
.sbGo .txt b{display:block;font-size:15px;letter-spacing:-.2px}
.sbGo .txt span{display:block;font-size:12px;opacity:.88;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbGo .sbBudget{flex:0 0 auto;background:rgba(255,255,255,.18);border-radius:9px;padding:8px 11px;font-size:13px;font-weight:800;min-height:36px;display:inline-flex;align-items:center}
.sbDone .big{font-size:38px;font-weight:800;letter-spacing:-1px;margin:6px 0 2px;color:var(--good)}
.sbDone .sub2{font-size:13px;color:var(--tx2);margin:0 0 14px}
@media(max-width:520px){.grid{grid-template-columns:1fr}.tile{padding:14px 15px}}
/* account button + auth modal (only shown when cloud sync is configured) */
.acct{display:flex;align-items:center;gap:8px}
.acctbtn{border:1px solid var(--line);background:var(--card);color:var(--tx2);border-radius:10px;padding:9px 13px;font-size:12.5px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.acctbtn:hover{border-color:var(--acc);color:var(--tx)}
.acctbtn .who{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acctbtn .dot{width:8px;height:8px;border-radius:50%;background:var(--good);flex:0 0 auto}
.cloudnote{font-size:12px;color:var(--tx3);margin:0 0 14px;padding:9px 13px;border:1px dashed var(--line2);border-radius:10px;background:var(--card)}
.cloudnote b{color:var(--acc)}
.modal{position:fixed;inset:0;background:rgba(5,9,16,.68);display:flex;align-items:center;justify-content:center;z-index:60;padding:18px;animation:fade .16s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--card);border:1px solid var(--line2);border-radius:16px;max-width:400px;width:100%;padding:22px;box-shadow:var(--shadow)}
.sheet h3{margin:0 0 4px;font-size:18px}
.sheet .lead{margin:0 0 16px;font-size:13px;color:var(--tx2);line-height:1.5}
.sheet label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin:0 0 5px}
.sheet input{width:100%;background:var(--card2);border:1.5px solid var(--line2);border-radius:10px;padding:11px 13px;color:var(--tx);font:inherit;outline:none;margin-bottom:12px}
.sheet input:focus{border-color:var(--acc)}
.sheet .go{width:100%;background:var(--acc);color:#fff;border-radius:11px;padding:12px;font-size:15px;font-weight:800;transition:.12s}
.sheet .go:hover{background:var(--acc2)} .sheet .go:disabled{opacity:.55}
.sheet .alt{margin-top:12px;text-align:center;font-size:13px;color:var(--tx2)}
.sheet .alt a{color:var(--acc);cursor:pointer;font-weight:700}
.sheet .msg{font-size:13px;border-radius:9px;padding:9px 12px;margin-bottom:12px;line-height:1.45}
.sheet .msg.err{background:rgba(255,107,107,.13);border:1px solid rgba(255,107,107,.4);color:#ff9a9a}
.sheet .msg.ok{background:rgba(57,217,138,.12);border:1px solid rgba(57,217,138,.4);color:var(--good)}
.sheet .x{float:right;font-size:19px;color:var(--tx3);padding:0 4px;margin:-4px -4px 0 0}
/* suggestions box (public — works signed out) */
.acct{margin-left:auto}
.suggbtn{border:1px solid var(--acc2);background:var(--acc);color:#fff;border-radius:10px;padding:9px 14px;font-size:12.5px;font-weight:800;letter-spacing:.2px;display:inline-flex;align-items:center;gap:6px;transition:.15s;box-shadow:0 3px 14px rgba(79,157,255,.3);flex:0 0 auto}
.suggbtn:hover{background:var(--acc2)}
.sheet.wide{max-width:560px;display:flex;flex-direction:column;max-height:min(84vh,700px)}
.sugg-form textarea{width:100%;background:var(--card2);border:1.5px solid var(--line2);border-radius:10px;padding:11px 13px;color:var(--tx);font:inherit;font-size:14px;outline:none;resize:vertical;min-height:62px;margin-bottom:9px}
.sugg-form textarea:focus{border-color:var(--acc)}
.sugg-row{display:flex;gap:9px}
.sugg-row input{flex:1;margin-bottom:0}
.sugg-row .go{width:auto;padding:11px 18px;font-size:14px;flex:0 0 auto}
.sugg-list{overflow-y:auto;margin:12px -6px 0;padding:0 6px;flex:1;min-height:60px}
.sugg-item{display:flex;gap:12px;align-items:flex-start;padding:12px 2px;border-top:1px solid var(--line)}
.sugg-item .txt{flex:1;font-size:14px;line-height:1.5;overflow-wrap:anywhere}
.sugg-item .byline{display:block;font-size:11.5px;color:var(--tx3);margin-top:3px}
.like{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:46px;border:1px solid var(--line2);background:var(--card2);border-radius:10px;padding:7px 8px;color:var(--tx2);font-weight:800;transition:.13s;flex:0 0 auto}
.like:hover{border-color:var(--acc);color:var(--tx)}
.like.on{background:rgba(79,157,255,.16);border-color:var(--acc);color:var(--acc)}
.like .thumb{font-size:15px;line-height:1;filter:grayscale(.45);transition:filter .13s}
.like.on .thumb,.like:hover .thumb{filter:none}
.like .n{font-size:14px;line-height:1.1;font-variant-numeric:tabular-nums}
.sugg-del{background:none;border:none;color:var(--tx3);font:inherit;font-size:11.5px;cursor:pointer;padding:0;margin-left:2px;text-decoration:underline;text-underline-offset:2px}
.sugg-del:hover{color:var(--hard)}
.sugg-note{font-size:12.5px;color:var(--tx3);text-align:center;padding:18px 6px 6px}
@media(max-width:520px){.suggbtn{padding:9px 11px;font-size:12px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>🧭 BN Hub</h1>
      <p class="sub">Study tools &amp; apps for the BN — everything in one place. All free, all offline-capable.</p>
    </div>
    <div class="acct">
      <button class="suggbtn" id="btnSugg" title="Tell me what to build next — no account needed">💡 Suggestions</button>
      <button class="acctbtn" id="btnAcct" style="display:none"></button>
      <button class="iconbtn" id="btnTheme" title="Theme">◐</button>
    </div>
  </header>
  <button class="sbGo" id="sbGo" title="One press — the highest-yield session across every app, precomputed">
    <span class="zap">⚡</span>
    <span class="txt"><b id="sbT">Study</b><span id="sbS">…</span></span>
    <span class="sbBudget" id="sbB" title="Session length — tap to change">20′</span>
  </button>
  <div id="cloudNote"></div>
  <div class="search"><input id="q" placeholder="Filter… (e.g. cram, anatomy, med calc)" autocomplete="off"/></div>
  <div id="sections"></div>
  <div class="foot">Made by a BN student, for BN students. Check answers against your own course material — it always wins.</div>
</div>

<!-- Cloud sync (optional): dormant until hub/cloud/config.js is filled in -->
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="cloud/config.js"></script>
<script src="cloud/cloud.js"></script>
<!-- ⚡ Study engine calendar — the machine-readable mirror of bn2-brief.html -->
<script src="deadlines.js"></script>

<script>
'use strict';
/* ╔════════════════════════════════════════════════════════════════════╗
   ║ ADDING A PROJECT = add ONE object to PROJECTS below. Fields:       ║
   ║   cat  — must match a CATEGORIES id                                ║
   ║   ic   — emoji icon      nm — display name                        ║
   ║   ds   — one-line description (what it is + what it's for)         ║
   ║   url  — full https URL of the live app                            ║
   ║   badge (optional) — 'new' | 'beta'                                ║
   ║ Then commit + push this repo. That's the whole integration.        ║
   ╚════════════════════════════════════════════════════════════════════╝ */
/* ===== PROJECTS START ===== */
const CATEGORIES=[
  {id:'sem2', name:'📗 Semester 2', subs:[
    {id:'sem2-pharm',   name:'Introduction to Pharmacology'},
    {id:'sem2-nursing', name:'Introduction to Nursing Practice'},
    {id:'sem2-hs2',     name:'Health Science 2'},
  ]},
  {id:'sem3', name:'📘 Semester 3', hidden:true},
  {id:'sem4', name:'📙 Semester 4', hidden:true},
  {id:'sem5', name:'📕 Semester 5', hidden:true},
  {id:'sem6', name:'📓 Semester 6', hidden:true},
  {id:'skills', name:'🧮 Clinical skills'},   // cross-semester tools (e.g. med-calc gate)
  {id:'career', name:'🩺 Career'},
];
const PROJECTS=[
  // --- Semester 2 → whole-semester overview (sits directly under Semester 2, above the papers) ---
  {cat:'sem2', ic:'🗺️', nm:'Semester 2 · Master Schedule & Guide', ds:'The whole semester, mapped and decoded: a week-by-week timeline of every class, lab, test and exam across all three papers — with topics, collision warnings, corrected dates and tactics for tackling it wisely.', url:'https://jeremyspm.github.io/bn2-brief.html', badge:'new', date:'22/07/2026'},
  // --- Semester 2 → Introduction to Pharmacology ---
  {cat:'sem2-pharm', ic:'💊', nm:'Pharmacology · Pre-Class Deep Dive', ds:'Introduction to Pharmacology (61985). Orient → see it → self-test across all ten modules: concepts & sourcing, PK/PD, med calcs, the 8 Rights, lifespan, legal/ethical & drug development.', url:'https://jeremyspm.github.io/pharmacology-hub/', badge:'new', date:'22/07/2026'},
  // --- Semester 2 → Health Science 2 ---
  {cat:'sem2-hs2', ic:'🫀', nm:'Module 1 · Pre-Class Deep Dive', ds:'Cardiovascular, respiratory & lymphatic (722.541). Orient → see it → self-test with your lecturer’s own questions.', url:'https://jeremyspm.github.io/module1-study-hub/', date:'20/07/2026'},
  // --- clinical skills (not tied to one semester) ---
  {cat:'skills', ic:'💉', nm:'MedCalc Drill', ds:'Unlimited medication-calculation practice: 8 question types, tells you exactly which slip you made, plus a pass-gate exam simulator.', url:'https://jeremyspm.github.io/medcalc/', badge:'beta'},
  // --- career ---
  {cat:'career', ic:'🎓', nm:'The NP Roadmap', ds:'BN1 to Nurse Practitioner in Aotearoa: every stage, requirement, funding scheme and decision point, with sources.', url:'https://jeremyspm.github.io/np-roadmap.html', badge:'new'},
  {cat:'career', ic:'🚑', nm:'ED Nurse Checklist', ds:'2,341-item tickable competency map from Semester 1-2 student to competent ED nurse, staged and searchable.', url:'https://jeremyspm.github.io/ed-checklist/', badge:'new'},
  // ── Dev tool — kept INTERNAL, not shown on the hub (2026-07-20). Still live at its URL for building
  //    packs, but future study hubs are meant to be bespoke/polished per topic, not one-size-fits-all. ──
  // {cat:'tool', ic:'🏗️', nm:'Cram Engine (template + demo)', ds:'The reusable shell behind the cram tools — copy it, drop in a content pack, get a full study app. Demo: vital signs.', url:'https://jeremyspm.github.io/cram-engine/'},

  // ── Legacy (Jeremy's call, 2026-07-20) — still live at its URL, just not advertised on the hub ──
  // {cat:'career', ic:'🛂', nm:'Placement Passport', ds:'Clinical portfolio: placement hours, skills sign-offs, Gibbs reflections, printable PDF report. Your data stays on your device.', url:'https://jeremyspm.github.io/placement-passport/', badge:'beta'},

  // ── Culled from the hub 2026-07-18 (apps still live at their URLs; un-comment any line to restore it) ──
  // {cat:'cram', ic:'🧠', nm:'BN1 722.553 Final Cram', ds:'669-card active-recall trainer for the Foundations of Nursing final — MCQ + 5-mark drills mirroring the real paper.', url:'https://jeremyspm.github.io/bn1-cram/'},
  // {cat:'cram', ic:'🍽️', nm:'Test 3 Cram — Health Science 1', ds:'Digestion, nutrients & metabolism: MCQ trainer, case vault, exam mode, glossary, read-aloud.', url:'https://jeremyspm.github.io/health-science-test3-cram/'},
  // {cat:'cram', ic:'⚡', nm:'BN1 Drill — Health Science 1', ds:'Rapid-fire drill tool for Health Science 1.', url:'https://jeremyspm.github.io/bn1-drill/'},
  // {cat:'cram', ic:'🔬', nm:'Module 1 Deep Dive — Health Science 2', ds:'Pre-class deep-dive study hub for 722.541 Module 1.', url:'https://jeremyspm.github.io/module1-study-hub/'},
  // {cat:'cram', ic:'📝', nm:'Continuous Test 2 Hub', ds:'Study hub for Health Science 1 Continuous Test 2.', url:'https://1999jeremym.github.io/continuoustest2/'},
  // {cat:'cram', ic:'👶', nm:'Lifespan Quiz 1 Study Hub', ds:'Human lifespan & development — quiz prep hub.', url:'https://1999jeremym.github.io/FONlifespanquiz1/'},
  // {cat:'cram', ic:'🤝', nm:'FOPD Professionalism Summative', ds:'Foundations of Professional Development — summative prep.', url:'https://1999jeremym.github.io/FOPDProfessionalismSummative/'},
  // {cat:'sim', ic:'🫘', nm:'Nephron Simulator', ds:'Nephron flow & fluid balance simulator — student nurse edition.', url:'https://1999jeremym.github.io/nephron/'},
  // {cat:'sim', ic:'🚻', nm:'Urinary System Hub', ds:'Interactive urinary system study hub.', url:'https://1999jeremym.github.io/urinary/'},
  // {cat:'sim', ic:'🦴', nm:'BN1 Anatomy Explorer', ds:'Interactive anatomy explorer for BN1.', url:'https://1999jeremym.github.io/test2outline/'},
  // {cat:'life', ic:'✈️', nm:'Japan 2027 Trip Tracker', ds:'Trip planning & tracking for Japan, February 2027.', url:'https://jeremyspm.github.io/japan-2027/'},
];
/* ===== PROJECTS END ===== */

const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
function tileHtml(p){
  return `<a class="tile" href="${p.url}" ${p.badge?`data-b="${p.badge}"`:''}>
    ${p.badge?`<span class="badge ${p.badge}">${p.badge}</span>`:''}
    <span class="top"><span class="ic">${p.ic}</span><span class="nm">${esc(p.nm)}</span></span>
    <span class="ds">${esc(p.ds)}</span>
    ${p.date?`<span class="tiledate">${esc(p.date)}</span>`:''}
  </a>`;
}
function render(filter){
  const toks=(filter||'').trim().toLowerCase().split(/\s+/).filter(Boolean);
  const secs=CATEGORIES.filter(cat=>!cat.hidden).map(cat=>{
    const hay=cat.name.toLowerCase();  // let a category name (e.g. "career") surface its tiles too
    const matches=p=>toks.every(t=>(p.nm+' '+p.ds+' '+hay).toLowerCase().includes(t));

    if(cat.subs){   // e.g. Semester 2 -> its papers
      // category-level tiles (cat:'sem2') render directly under the section heading, above the papers
      const direct=PROJECTS.filter(p=>p.cat===cat.id&&matches(p));
      const directHtml=direct.length?`<div class="grid">${direct.map(tileHtml).join('')}</div>`:'';
      const subHtml=cat.subs.map(sub=>{
        const items=PROJECTS.filter(p=>p.cat===sub.id&&matches(p));
        if(items.length) return `<h3 class="subsec">${esc(sub.name)}</h3><div class="grid">${items.map(tileHtml).join('')}</div>`;
        if(!toks.length) return `<h3 class="subsec">${esc(sub.name)}</h3><div class="soon soon-sub">No study hubs here yet.</div>`;
        return '';
      }).join('');
      if(!directHtml && !subHtml) return '';
      return `<h2 class="sec">${cat.name}</h2>${directHtml}${subHtml}`;
    }

    const items=PROJECTS.filter(p=>p.cat===cat.id&&matches(p));
    if(items.length) return `<h2 class="sec">${cat.name}</h2><div class="grid">${items.map(tileHtml).join('')}</div>`;
    // empty semester sections still show — the degree-long scaffolding (hidden while searching)
    if(cat.id.startsWith('sem') && !toks.length)
      return `<h2 class="sec">${cat.name}</h2><div class="soon">Study hubs for this semester will appear here as you build them.</div>`;
    return '';
  }).join('');
  $('#sections').innerHTML=secs||`<div class="empty">Nothing matches "${esc(toks.join(' '))}".</div>`;
}
$('#q').oninput=e=>render(e.target.value);
const TK='hub.theme';
function applyTheme(){ document.documentElement.setAttribute('data-theme',localStorage.getItem(TK)||'dark'); }
$('#btnTheme').onclick=()=>{ localStorage.setItem(TK,(localStorage.getItem(TK)||'dark')==='dark'?'light':'dark'); applyTheme(); };
applyTheme();
render('');

/* ---------- ⚡ Study engine (v0) — see STUDY-ENGINE-SPEC.md ----------
   Reads studybus.pulse.* bids off the shared-origin bus, weights them by
   the DEADLINES calendar, precompiles a session plan, and deep-links
   through the apps with ?sb=N return tickets. Semester-agnostic: BN3 is
   a data append in deadlines.js, never a change here. */
(function(){
  const D=window.DEADLINES; if(!D){ return; }
  const DAY=86400e3, PK='studybus.plan', BK='studybus.budget', SK='studybus.streak';
  const today=new Date().setHours(0,0,0,0);
  const parseD=s=>new Date(s+'T12:00:00').getTime();
  const jget=(k,d)=>{ try{ const v=JSON.parse(localStorage.getItem(k)); return v==null?d:v; }catch(e){ return d; } };
  const jset=(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} };
  const addQ=(u,q)=>u+(u.includes('?')?'&':'?')+q;

  // next future sitting of an assessment, or null if past/done/archived
  function nextDate(a){
    if(a.done) return null;
    const p=D.papers[a.paper]; if(p&&p.archived) return null;
    let c=[];
    if(a.window) c.push(a.window.close);
    else if(a.streamDates) c=(D.stream&&a.streamDates[D.stream])?[a.streamDates[D.stream]]:Object.values(a.streamDates);
    else if(a.due) c.push(a.due);
    (a.resits||[]).forEach(r=>c.push(r));
    const fut=c.map(parseD).filter(t=>t>=today).sort((x,y)=>x-y);
    return fut.length?fut[0]:null;
  }
  // score = evPerMin × weight × urgency × hurdleBoost, vs the offer's strongest assessment
  function scoreOffer(o,pulse){
    let best=0, bestA=null;
    (o.assess||[]).forEach(id=>{
      const a=D.assessments.find(x=>x.id===id);
      if(!a||a.kind==='assignment'||a.kind==='signoff') return;   // recall work only
      const t=nextDate(a); if(t==null) return;
      const d=Math.max(0,(t-today)/DAY);
      const W=a.hurdle?1:(a.weight?a.weight/100:0.03);
      const s=W * (1/(1+d/7)) * (a.hurdle&&d<=21?3:1);
      if(s>best){ best=s; bestA=a; }
    });
    if(!bestA) return null;
    // stale pulses undersell their app (cards decayed since ts) — inflate, plus a neglect bump
    const age=(Date.now()-(pulse.ts||0))/DAY;
    let f=Math.min(2,Math.exp(age/7)); if(age>7) f*=1.25;
    return { score:(o.evPerMin||0.2)*best*f, paper:bestA.paper };
  }
  function pulses(){
    const out=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.indexOf('studybus.pulse.')===0){
        const p=jget(k,null);
        if(p&&p.app&&p.url&&Array.isArray(p.offers)) out.push(p);
      }
    }
    return out;
  }
  function buildPlan(budget){
    const cand=[];
    pulses().forEach(p=>p.offers.forEach(o=>{
      const r=scoreOffer(o,p); if(!r) return;
      cand.push({ app:p.app, name:p.name||p.app, url:o.deep?p.url+o.deep:p.url,
        label:o.label||p.name, minutes:Math.max(3,Math.min(o.minutes||8,budget)),
        score:r.score, paper:r.paper });
    }));
    cand.sort((a,b)=>b.score-a.score);
    // ≤60% of a session from one paper — but only once ≥2 papers have apps
    // enrolled; with a single paper there's nothing to diversify into
    const nPapers=new Set(cand.map(c=>c.paper)).size;
    const legs=[], per={}, cap=nPapers>1?Math.ceil(budget*0.6):budget;
    let used=0;
    for(const c of cand){
      if(legs.length>=4||used>=budget) break;
      if(legs.some(l=>l.url===c.url)) continue;
      const m=Math.min(c.minutes,budget-used); if(m<3) continue;
      if(legs.length&&(per[c.paper]||0)+m>cap) continue;
      legs.push({...c,minutes:m}); per[c.paper]=(per[c.paper]||0)+m; used+=m;
    }
    return { v:1, builtTs:Date.now(), budget, used, legs, hub:location.origin+location.pathname };
  }
  // fallback when no app has enrolled yet: point at the nearest deadline
  function nearest(){
    let best=null;
    D.assessments.forEach(a=>{ const t=nextDate(a); if(t!=null&&(!best||t<best.t)) best={t,a}; });
    return best;
  }

  const btn=$('#sbGo'), tEl=$('#sbT'), sEl=$('#sbS'), bEl=$('#sbB');
  let budget=jget(BK,20), plan=null;
  function refresh(){
    bEl.textContent=budget+'′';
    plan=buildPlan(budget);
    if(plan.legs.length){
      tEl.textContent='⚡ Study · '+plan.used+' min, ready to go';
      sEl.textContent=plan.legs.map(l=>l.label).join('  →  ');
    } else {
      const n=nearest();
      tEl.textContent='⚡ Study';
      sEl.textContent=n?('open an app once to enrol it · next up: '+n.a.name+' in '+Math.floor((n.t-today)/DAY)+' d')
                      :'add this semester to deadlines.js to begin';
    }
    btn.classList.add('on');
  }
  btn.onclick=e=>{
    if(e.target.closest('#sbB')){ budget=({10:20,20:40,40:10})[budget]||20; jset(BK,budget); refresh(); return; }
    if(!plan||!plan.legs.length){ location.href='bn2-brief.html'; return; }
    plan=buildPlan(budget); jset(PK,plan);          // rebuild fresh at press time
    location.href=addQ(plan.legs[0].url,'sb=0');
  };
  refresh();
  window.addEventListener('pageshow',refresh);       // coming back from an app re-scores

  /* ---- done screen (?sbdone=1): one number + streak ---- */
  if(new URLSearchParams(location.search).get('sbdone')){
    const p=jget(PK,null);
    const marks=p&&p.legs?p.legs.reduce((s,l)=>s+l.score*l.minutes,0):0;
    const t=new Date(), iso=d=>new Date(d).toISOString().slice(0,10);
    const st=jget(SK,{last:'',n:0});
    if(st.last!==iso(t)){ st.n=(st.last===iso(t-DAY))?st.n+1:1; st.last=iso(t); jset(SK,st); }
    const m=document.createElement('div'); m.className='modal';
    m.innerHTML=`<div class="sheet sbDone" style="text-align:center">
      <h3>Session done ✅</h3>
      <div class="big">≈ ${(Math.round(marks*10)/10).toFixed(1)}</div>
      <p class="sub2">marks defended · ${st.n}-day streak 🔥</p>
      <button class="go" id="sbAgain">⚡ One more session</button>
      <div class="alt"><a id="sbClose">Done for now</a></div>
    </div>`;
    m.querySelector('#sbClose').onclick=()=>m.remove();
    m.querySelector('#sbAgain').onclick=()=>{ m.remove(); btn.click(); };
    m.onclick=e=>{ if(e.target===m) m.remove(); };
    document.body.appendChild(m);
    history.replaceState(null,'',location.pathname);   // clean the URL so refresh ≠ re-celebrate
  }
})();

/* ---------- cloud account UI (only if Cloud is configured) ---------- */
(function(){
  if(!window.Cloud || !Cloud.enabled) return;   // dormant → hub looks exactly as before
  const btn=$('#btnAcct'), note=$('#cloudNote');
  btn.style.display='inline-flex';
  Cloud.onChange(user=>{
    if(user){
      btn.innerHTML=`<span class="dot"></span><span class="who">${esc(user.email||'signed in')}</span>`;
      btn.title='Signed in — click to sign out';
      note.innerHTML=`<span>☁️ <b>Synced.</b> Your progress in every app follows you to any device you sign in on.</span>`;
    } else {
      btn.innerHTML=`☁️ Sign in`;
      btn.title='Sign in to sync your progress across devices';
      note.innerHTML=`<span>☁️ <b>Cloud sync available.</b> Sign in once here and your progress syncs across devices. Optional — everything works offline without it.</span>`;
    }
  });
  btn.onclick=()=>{ Cloud.user() ? Cloud.signOut() : openAuth(); };

  function openAuth(){
    let mode='in';
    const m=document.createElement('div'); m.className='modal';
    const draw=()=>{
      m.innerHTML=`<div class="sheet">
        <button class="x" id="ax">✕</button>
        <h3>${mode==='in'?'Sign in':'Create account'}</h3>
        <p class="lead">${mode==='in'?'Sign in to sync your progress across devices.':'Just an email and a password — used only to keep your own data yours.'}</p>
        <div id="amsg"></div>
        <label>Email</label><input id="ae" type="email" autocomplete="email" placeholder="you@example.com"/>
        <label>Password</label><input id="ap" type="password" autocomplete="${mode==='in'?'current-password':'new-password'}" placeholder="${mode==='in'?'your password':'at least 6 characters'}"/>
        <button class="go" id="ago">${mode==='in'?'Sign in':'Create account'}</button>
        <div class="alt">${mode==='in'?`No account? <a id="aswap">Create one</a> &nbsp;·&nbsp; <a id="aforgot">Forgot password?</a>`:`Have an account? <a id="aswap">Sign in</a>`}</div>
        ${mode==='up'?`<p class="fineprint" style="margin:14px 0 0;font-size:12px;line-height:1.5;opacity:.6;text-align:center;">🔒 Your password is encrypted by our login provider — no one, including us, can ever see it. Please don't reuse a password from your bank or email. We only store your study progress.</p>`:''}
      </div>`;
      m.querySelector('#ax').onclick=()=>m.remove();
      m.querySelector('#aswap').onclick=()=>{ mode=mode==='in'?'up':'in'; draw(); };
      const fg=m.querySelector('#aforgot'); if(fg) fg.onclick=forgot;
      m.querySelector('#ago').onclick=submit;
      m.querySelector('#ap').onkeydown=e=>{ if(e.key==='Enter') submit(); };
      m.querySelector('#ae').focus();
    };
    async function submit(){
      const email=m.querySelector('#ae').value.trim(), pw=m.querySelector('#ap').value;
      const msg=m.querySelector('#amsg'), go=m.querySelector('#ago');
      if(!email||!pw){ msg.innerHTML=`<div class="msg err">Enter your email and password.</div>`; return; }
      go.disabled=true; go.textContent='…';
      let r;
      try{ r = mode==='in' ? await Cloud.signIn(email,pw) : await Cloud.signUp(email,pw); }
      catch(e){ r = {error:{message:'Something went wrong — try again.'}}; }
      if(r && r.error){
        msg.innerHTML=`<div class="msg err">${esc(r.error.message||'Something went wrong.')}</div>`;
        go.disabled=false; go.textContent=mode==='in'?'Sign in':'Create account';
        return;
      }
      // Sign-up with email confirmation ON returns a user but no session yet.
      if(mode==='up' && !(r.data&&r.data.session)){
        msg.innerHTML=`<div class="msg ok">Account made — check your email to confirm, then sign in.</div>`;
        go.disabled=false; go.textContent='Sign in'; mode='in'; return;
      }
      m.remove();   // onAuthStateChange updates the button + pulls data
    }
    async function forgot(){
      const email=m.querySelector('#ae').value.trim();
      const msg=m.querySelector('#amsg');
      if(!email){ msg.innerHTML=`<div class="msg err">Type your email above first, then tap “Forgot password?”.</div>`; m.querySelector('#ae').focus(); return; }
      msg.innerHTML=`<div class="msg ok">Sending…</div>`;
      let r; try{ r=await Cloud.resetPassword(email); }catch(e){ r={error:{message:'Something went wrong.'}}; }
      if(r && r.error){ msg.innerHTML=`<div class="msg err">${esc(r.error.message||'Could not send the reset email.')}</div>`; return; }
      msg.innerHTML=`<div class="msg ok">If an account exists for <b>${esc(email)}</b>, a reset link is on its way. <b>Check your spam folder</b> — it can take a few minutes.</div>`;
    }
    m.onclick=e=>{ if(e.target===m) m.remove(); };
    draw(); document.body.appendChild(m);
  }
})();

/* ---------- suggestions box: anyone can suggest & upvote, no login ---------- */
(function(){
  const DEV='hub.sugg.device', VOTED='hub.sugg.voted', MINE='hub.sugg.mine';
  // A random id per browser — the database's primary key makes it one like
  // per suggestion per device (honest visitors; not bulletproof, doesn't need to be).
  // It's also the secret that lets this device delete its own posts & likes.
  function dev(){
    let d=localStorage.getItem(DEV);
    if(!d){ d=(crypto.randomUUID&&crypto.randomUUID())||(Date.now().toString(36)+Math.random().toString(36).slice(2,12));
      try{ localStorage.setItem(DEV,d); }catch(e){} }
    return d;
  }
  // set helpers, reused for both "liked" and "my own posts" id lists
  function getSet(k){ try{ return new Set(JSON.parse(localStorage.getItem(k))||[]); }catch(e){ return new Set(); } }
  function addTo(k,id){ const s=getSet(k); s.add(id); try{ localStorage.setItem(k,JSON.stringify([...s])); }catch(e){} }
  function delFrom(k,id){ const s=getSet(k); s.delete(id); try{ localStorage.setItem(k,JSON.stringify([...s])); }catch(e){} }
  const voted=()=>getSet(VOTED), remember=id=>addTo(VOTED,id), forget=id=>delFrom(VOTED,id);
  const owned=()=>getSet(MINE),  ownPost=id=>addTo(MINE,id),   disown=id=>delFrom(MINE,id);
  async function db(){ if(window.Cloud&&Cloud.enabled){ await Cloud.ready; return Cloud.client; } return null; }
  const fmt=d=>{ try{ return new Date(d).toLocaleDateString(undefined,{day:'numeric',month:'short'}); }catch(e){ return ''; } };

  $('#btnSugg').onclick=function(){
    const m=document.createElement('div'); m.className='modal';
    m.innerHTML=`<div class="sheet wide">
      <button class="x" id="sx">✕</button>
      <h3>💡 Suggestions</h3>
      <p class="lead">What should I build next for the BN Hub? No account needed — drop an idea below, and 👍 like the ones you want most.</p>
      <div id="smsg"></div>
      <div class="sugg-form">
        <textarea id="sbody" maxlength="500" placeholder="e.g. A fluid &amp; electrolytes cram tool… a quiz per drug class… anything you wish existed."></textarea>
        <div class="sugg-row">
          <input id="sname" maxlength="40" placeholder="Name (optional — blank = anonymous)"/>
          <button class="go" id="ssend">Suggest</button>
        </div>
      </div>
      <div class="sugg-list" id="slist"><div class="sugg-note">Loading…</div></div>
    </div>`;
    m.onclick=e=>{ if(e.target===m) m.remove(); };
    m.querySelector('#sx').onclick=()=>m.remove();
    m.querySelector('#ssend').onclick=submit;
    document.body.appendChild(m);
    load();

    async function load(){
      const list=m.querySelector('#slist'); if(!list) return;
      const c=await db();
      if(!c){ list.innerHTML=`<div class="sugg-note">The suggestions box can't reach the server right now — try again in a minute.</div>`; return; }
      let r; try{ r=await c.from('suggestions')
        .select('id,body,author,created_at,votes:suggestion_votes(count)')
        .order('created_at',{ascending:false}).limit(200); }
      catch(e){ r={error:e}; }
      if(!r||r.error){ list.innerHTML=`<div class="sugg-note">Couldn't load suggestions — check your connection and try again.</div>`; return; }
      const liked=voted(), mineIds=owned();
      const rows=(r.data||[])
        .map(s=>({id:s.id,body:s.body,author:s.author,created_at:s.created_at,n:(s.votes&&s.votes[0]&&s.votes[0].count)||0}))
        .sort((a,b)=>b.n-a.n || new Date(b.created_at)-new Date(a.created_at));
      list.innerHTML = rows.length ? rows.map(s=>`
        <div class="sugg-item">
          <button class="like${liked.has(s.id)?' on':''}" data-id="${s.id}" title="${liked.has(s.id)?'You liked this — tap to remove':'Like'}">
            <span class="thumb">👍</span><span class="n">${s.n}</span>
          </button>
          <div class="txt">${esc(s.body)}<span class="byline">${s.author?esc(s.author):'Anonymous'} · ${fmt(s.created_at)}${mineIds.has(s.id)?` · <button class="sugg-del" data-id="${s.id}">Delete</button>`:''}</span></div>
        </div>`).join('')
        : `<div class="sugg-note">No suggestions yet — yours could be the first.</div>`;
      list.querySelectorAll('.like').forEach(b=>{ b.onclick=()=>like(b); });
      list.querySelectorAll('.sugg-del').forEach(b=>{ b.onclick=()=>del(b); });
    }

    function showErr(t){ const msg=m.querySelector('#smsg'); if(msg) msg.innerHTML=`<div class="msg err">${t}</div>`; }

    async function like(b){
      const id=b.dataset.id, n=b.querySelector('.n');
      const c=await db();
      if(voted().has(id)){
        // un-like → optimistic, then remove this device's vote via the owner-scoped RPC
        b.classList.remove('on'); b.title='Like'; n.textContent=String(Math.max(0,+n.textContent-1));
        let r; try{ r=c?await c.rpc('remove_vote',{p_id:id,p_voter:dev()}):{error:{message:'offline'}}; }
        catch(e){ r={error:{message:String(e)}}; }
        if(r&&r.error){
          b.classList.add('on'); b.title='You liked this — tap to remove'; n.textContent=String(+n.textContent+1);
          showErr("Couldn't remove your like — check your connection and try again."); return;
        }
        forget(id);
      } else {
        // like → optimistic insert
        b.classList.add('on'); b.title='You liked this — tap to remove'; n.textContent=String((+n.textContent||0)+1);
        let r; try{ r=c?await c.from('suggestion_votes').insert({suggestion_id:id,voter:dev()}):{error:{message:'offline'}}; }
        catch(e){ r={error:{message:String(e)}}; }
        // 23505 = this device already liked (e.g. in another tab) — that still counts.
        if(r&&r.error&&r.error.code!=='23505'){
          b.classList.remove('on'); b.title='Like'; n.textContent=String(Math.max(0,+n.textContent-1));
          showErr("Couldn't save your like — check your connection and try again."); return;
        }
        remember(id);
      }
    }

    async function del(b){
      const id=b.dataset.id;
      if(!confirm('Delete your suggestion? This can’t be undone.')) return;
      const c=await db();
      let r; try{ r=c?await c.rpc('delete_suggestion',{p_id:id,p_device:dev()}):{error:{message:'offline'}}; }
      catch(e){ r={error:{message:String(e)}}; }
      if(r&&r.error){ showErr("Couldn't delete it — check your connection and try again."); return; }
      disown(id); forget(id);
      load();
    }

    async function submit(){
      const body=m.querySelector('#sbody').value.trim();
      const name=m.querySelector('#sname').value.trim();
      const msg=m.querySelector('#smsg'), go=m.querySelector('#ssend');
      if(body.length<3){ msg.innerHTML=`<div class="msg err">Write a little more — a few words at least.</div>`; return; }
      go.disabled=true; go.textContent='…';
      const c=await db();
      // author_device tags the row with this browser's secret so only this device
      // can later delete it; .select() returns the new id so we can show that Delete button.
      let r; try{ r=c?await c.from('suggestions').insert({body:body,author:name||null,author_device:dev()}).select('id').single():{error:{message:'offline'}}; }
      catch(e){ r={error:{message:String(e)}}; }
      go.disabled=false; go.textContent='Suggest';
      if(r&&r.error){ msg.innerHTML=`<div class="msg err">Couldn't send it — check your connection and try again.</div>`; return; }
      if(r&&r.data&&r.data.id) ownPost(r.data.id);
      m.querySelector('#sbody').value='';
      msg.innerHTML=`<div class="msg ok">Added — thank you! 🎉</div>`;
      load();
    }
  };
})();
</script>
